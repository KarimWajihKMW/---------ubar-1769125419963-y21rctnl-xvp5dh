apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ubar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/karimwajihkmw/ubar-monolith:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "gateway/server.js"]
          env:
            - name: GATEWAY_PORT
              value: "8080"
            - name: TRIPS_SERVICE_URL
              value: http://trips-service:4101
            - name: PAYMENTS_SERVICE_URL
              value: http://payments-service:4102
            - name: MONOLITH_URL
              value: http://monolith:3000
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 8
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ubar
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
