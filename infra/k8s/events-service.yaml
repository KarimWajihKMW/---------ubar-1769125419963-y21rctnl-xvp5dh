apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-service
  namespace: ubar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: events-service
  template:
    metadata:
      labels:
        app: events-service
    spec:
      containers:
        - name: events-service
          image: ghcr.io/karimwajihkmw/ubar-monolith:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "services/events-service/server.js"]
          envFrom:
            - configMapRef:
                name: ubar-config
            - secretRef:
                name: ubar-secrets
          ports:
            - containerPort: 4106
          readinessProbe:
            httpGet:
              path: /api/events-service/health
              port: 4106
            initialDelaySeconds: 8
            periodSeconds: 8
---
apiVersion: v1
kind: Service
metadata:
  name: events-service
  namespace: ubar
  labels:
    app: events-service
spec:
  selector:
    app: events-service
  ports:
    - name: http
      port: 4106
      targetPort: 4106
