apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  namespace: ubar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monolith
  template:
    metadata:
      labels:
        app: monolith
    spec:
      containers:
        - name: monolith
          image: ghcr.io/karimwajihkmw/ubar-monolith:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ubar-config
            - secretRef:
                name: ubar-secrets
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: monolith
  namespace: ubar
  labels:
    app: monolith
spec:
  selector:
    app: monolith
  ports:
    - name: http
      port: 3000
      targetPort: 3000
