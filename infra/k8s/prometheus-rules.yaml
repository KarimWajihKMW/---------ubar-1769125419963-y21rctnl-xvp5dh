apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ubar-alert-rules
  namespace: ubar
spec:
  groups:
    - name: ubar-platform.rules
      rules:
        - alert: UbarGatewayHighErrorRate
          expr: |
            sum(rate(ubar_gateway_http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(ubar_gateway_http_requests_total[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Gateway 5xx rate is above 5%"
        - alert: UbarMonolithHighLatencyP95
          expr: |
            histogram_quantile(0.95, sum(rate(ubar_monolith_http_request_duration_ms_bucket[5m])) by (le)) > 1200
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Monolith P95 latency above 1200ms"
        - alert: UbarTripsServiceDown
          expr: up{job=~".*trips.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Trips service appears down"
        - alert: UbarPaymentsServiceDown
          expr: up{job=~".*payments.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Payments service appears down"
