apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: monolith-metrics
  namespace: ubar
spec:
  selector:
    matchLabels:
      app: monolith
  namespaceSelector:
    matchNames: [ubar]
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
