apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: ubar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/karimwajihkmw/ubar-monolith:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "services/ai-service/server.js"]
          envFrom:
            - configMapRef:
                name: ubar-config
          ports:
            - containerPort: 4104
          readinessProbe:
            httpGet:
              path: /api/ai-service/health
              port: 4104
            initialDelaySeconds: 8
            periodSeconds: 8
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: ubar
  labels:
    app: ai-service
spec:
  selector:
    app: ai-service
  ports:
    - name: http
      port: 4104
      targetPort: 4104
