apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: ubar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-service
  template:
    metadata:
      labels:
        app: payments-service
    spec:
      containers:
        - name: payments-service
          image: ghcr.io/karimwajihkmw/ubar-monolith:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "services/payments-service/server.js"]
          envFrom:
            - configMapRef:
                name: ubar-config
          ports:
            - containerPort: 4102
          readinessProbe:
            httpGet:
              path: /api/payments-service/health
              port: 4102
            initialDelaySeconds: 8
            periodSeconds: 8
---
apiVersion: v1
kind: Service
metadata:
  name: payments-service
  namespace: ubar
  labels:
    app: payments-service
spec:
  selector:
    app: payments-service
  ports:
    - name: http
      port: 4102
      targetPort: 4102
