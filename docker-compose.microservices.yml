version: '3.9'
services:
  gateway:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && node gateway/server.js"
    volumes:
      - ./:/app
    environment:
      GATEWAY_PORT: 8080
      TRIPS_SERVICE_URL: http://trips-service:4101
      PAYMENTS_SERVICE_URL: http://payments-service:4102
      OPS_SERVICE_URL: http://ops-service:4103
      AI_SERVICE_URL: http://ai-service:4104
      SAAS_SERVICE_URL: http://saas-service:4105
      EVENTS_SERVICE_URL: http://events-service:4106
      MONOLITH_URL: http://monolith:3000
    ports:
      - "8080:8080"
    depends_on:
      trips-service:
        condition: service_started
      payments-service:
        condition: service_started
      ops-service:
        condition: service_started
      ai-service:
        condition: service_started
      saas-service:
        condition: service_started
      events-service:
        condition: service_started
      monolith:
        condition: service_started

  trips-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && node services/trips-service/server.js"
    volumes:
      - ./:/app
    environment:
      TRIPS_SERVICE_PORT: 4101
    ports:
      - "4101:4101"

  payments-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && node services/payments-service/server.js"
    volumes:
      - ./:/app
    environment:
      PAYMENTS_SERVICE_PORT: 4102
      PAYMENT_PROVIDER: mockpay
      PAYMENT_WEBHOOK_SECRET: payment-webhook-dev-secret
      MOCKPAY_PAYMENT_CHECKOUT_BASE_URL: https://mockpay.local
    ports:
      - "4102:4102"

  ops-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && node services/ops-service/server.js"
    volumes:
      - ./:/app
    environment:
      OPS_SERVICE_PORT: 4103
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ubar
    ports:
      - "4103:4103"

  ai-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && node services/ai-service/server.js"
    volumes:
      - ./:/app
    environment:
      AI_SERVICE_PORT: 4104
    ports:
      - "4104:4104"

  saas-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && node services/saas-service/server.js"
    volumes:
      - ./:/app
    environment:
      SAAS_SERVICE_PORT: 4105
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ubar
      BILLING_WEBHOOK_SECRET: billing-webhook-dev-secret
      BILLING_PROVIDER: mockpay
      MOCKPAY_CHECKOUT_BASE_URL: https://mockpay.local
      SAAS_BILLING_AUTOCYCLE_ENABLED: "false"
      SAAS_RECONCILIATION_ENABLED: "false"
    ports:
      - "4105:4105"

  events-service:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && node services/events-service/server.js"
    volumes:
      - ./:/app
    environment:
      EVENTS_SERVICE_PORT: 4106
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ubar
    ports:
      - "4106:4106"

  monolith:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ubar
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ubar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ubar"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
