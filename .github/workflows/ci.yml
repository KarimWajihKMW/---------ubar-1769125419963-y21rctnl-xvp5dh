name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ubar_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ubar_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ubar_ci
      JWT_SECRET: ci-jwt-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build check
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run gateway integration tests
        run: npm run test:gateway
