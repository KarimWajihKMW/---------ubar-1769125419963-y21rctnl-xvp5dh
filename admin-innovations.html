<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Innovations Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:'Cairo',sans-serif}</style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen p-6">
    <div class="max-w-7xl mx-auto space-y-6">
      <div class="bg-gradient-to-r from-indigo-700 to-violet-700 text-white rounded-2xl p-6 shadow-lg">
        <h1 class="text-2xl md:text-3xl font-extrabold">🚀 Admin Innovations Lab</h1>
        <p class="text-indigo-100 text-sm mt-1">تنفيذ كامل للأفكار الإدارية العشرة المعتمدة مع RBAC + Audit + KPIs</p>
      </div>

      <div class="bg-white rounded-2xl border border-gray-100 p-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
          <input id="token" type="password" class="md:col-span-2 px-3 py-2.5 rounded-xl border border-gray-200 font-bold" placeholder="Admin Token" />
          <button onclick="saveToken()" class="px-4 py-2.5 rounded-xl bg-indigo-600 text-white font-extrabold hover:bg-indigo-700">حفظ التوكن</button>
          <button onclick="refreshAll()" class="px-4 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-extrabold hover:bg-gray-200">تحديث الكل</button>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-5 gap-3" id="kpi-cards">
        <div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-500 font-bold">MTTR</p><p id="kpi-mttr" class="text-xl font-extrabold text-indigo-700">--</p></div>
        <div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-500 font-bold">Crisis Prevent %</p><p id="kpi-crisis" class="text-xl font-extrabold text-emerald-700">--</p></div>
        <div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-500 font-bold">Reopen Rate %</p><p id="kpi-reopen" class="text-xl font-extrabold text-amber-700">--</p></div>
        <div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-500 font-bold">Decision Accuracy %</p><p id="kpi-accuracy" class="text-xl font-extrabold text-violet-700">--</p></div>
        <div class="bg-white rounded-xl border p-4"><p class="text-xs text-gray-500 font-bold">False Alert %</p><p id="kpi-false" class="text-xl font-extrabold text-rose-700">--</p></div>
      </div>

      <div class="bg-white rounded-2xl border border-gray-100 p-5">
        <h2 class="font-extrabold mb-3">المميزات العشرة</h2>
        <div id="features" class="grid grid-cols-1 lg:grid-cols-2 gap-3"></div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div class="bg-white rounded-2xl border border-gray-100 p-4">
          <h3 class="font-extrabold mb-2">نتائج فورية</h3>
          <pre id="output" class="bg-gray-50 border rounded-xl p-3 text-xs font-bold whitespace-pre-wrap min-h-[280px]">--</pre>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 p-4">
          <h3 class="font-extrabold mb-2">Ethical Risk Dial</h3>
          <div class="grid grid-cols-3 gap-2 mb-2">
            <input id="dial-profit" type="number" step="0.01" min="0" max="1" class="px-2 py-2 border rounded-lg" placeholder="profit" />
            <input id="dial-fairness" type="number" step="0.01" min="0" max="1" class="px-2 py-2 border rounded-lg" placeholder="fairness" />
            <input id="dial-safety" type="number" step="0.01" min="0" max="1" class="px-2 py-2 border rounded-lg" placeholder="safety" />
          </div>
          <button onclick="updateDial()" class="w-full px-3 py-2.5 rounded-xl bg-violet-600 text-white font-extrabold">تحديث القرص</button>
          <pre id="dial-box" class="mt-3 bg-gray-50 border rounded-xl p-3 text-xs font-bold whitespace-pre-wrap min-h-[180px]">--</pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'akwadra_token';

    function token() { try { return localStorage.getItem(TOKEN_KEY); } catch(e){ return null; } }
    function saveToken() {
      const t = document.getElementById('token').value.trim();
      if (!t) return alert('أدخل التوكن');
      localStorage.setItem(TOKEN_KEY, t);
      alert('تم حفظ التوكن');
    }

    async function api(path, options = {}) {
      const t = token();
      const res = await fetch(`/api${path}`, {
        headers: {
          'Content-Type': 'application/json',
          ...(t ? { Authorization: `Bearer ${t}` } : {})
        },
        ...options
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data?.success) throw new Error(data?.error || `HTTP ${res.status}`);
      return data.data;
    }

    function setOutput(v) {
      document.getElementById('output').textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
    }

    async function runPolicyTwin() {
      const data = await api('/admin/innovations/policy-twin/simulate', {
        method: 'POST',
        body: JSON.stringify({ policy_name: 'dynamic_dispatch_v1', pricing_delta_pct: 8, driver_supply_delta_pct: 12, fairness_delta_pct: 10 })
      });
      setOutput(data);
      await loadKpis();
    }

    async function runCityPulse() {
      const data = await api('/admin/innovations/city-pulse/genome?refresh=1');
      setOutput(data);
      await loadKpis();
    }

    async function runTrustRoute() {
      await api('/admin/innovations/trust-route/rebuild', { method: 'POST', body: JSON.stringify({ window_days: 14 }) });
      const data = await api('/admin/innovations/trust-route?limit=30');
      setOutput(data);
    }

    async function runOutcomeMarket() {
      const created = await api('/admin/innovations/outcome-market/decision', {
        method: 'POST',
        body: JSON.stringify({
          title: 'Reduce cancellation by incentive shift',
          hypothesis: 'Shifting incentives to peak zones reduces cancellations',
          stake_points: 20,
          predicted_impact: { cancel_rate: -0.08, avg_wait_minutes: -1.2 }
        })
      });
      const settled = await api(`/admin/innovations/outcome-market/${created.id}/settle`, {
        method: 'PATCH',
        body: JSON.stringify({ actual_impact: { cancel_rate: -0.06, avg_wait_minutes: -1.0 } })
      });
      setOutput({ created, settled });
      await loadKpis();
    }

    async function runSilentCrisis() {
      const data = await api('/admin/innovations/silent-crisis/predict');
      setOutput(data);
      await loadKpis();
    }

    async function runRecoveryComposer() {
      const data = await api('/admin/innovations/recovery-composer/compose', {
        method: 'POST',
        body: JSON.stringify({ case_type: 'support_ticket', case_id: `demo-${Date.now()}`, severity: 'high', inconvenience_minutes: 45, sentiment: 35 })
      });
      setOutput(data);
      await loadKpis();
    }

    async function runNarrativeAudit() {
      const data = await api('/admin/innovations/narrative-audit/build', {
        method: 'POST',
        body: JSON.stringify({ title: 'Causal Story', window_hours: 48 })
      });
      setOutput(data);
    }

    async function runCopilotArena() {
      const session = await api('/admin/innovations/copilot-arena/session', {
        method: 'POST',
        body: JSON.stringify({ scenario_type: 'dispatch_shock', difficulty: 'hard' })
      });
      const scored = await api(`/admin/innovations/copilot-arena/session/${session.id}/score`, {
        method: 'PATCH',
        body: JSON.stringify({ submitted_decision: { action_speed: 75, safety_weight: 82, fairness_weight: 70 } })
      });
      setOutput({ session, scored });
    }

    async function runHubRebalancer() {
      await api('/admin/innovations/hub-rebalancer/rebalance', { method: 'POST', body: JSON.stringify({}) });
      const data = await api('/admin/innovations/hub-rebalancer/actions');
      setOutput(data);
    }

    async function runRoadmap() {
      const data = await api('/admin/innovations/roadmap');
      setOutput(data);
    }

    async function runComplianceReport() {
      const data = await api('/admin/innovations/compliance-report');
      setOutput(data);
    }

    async function loadEthicalDial() {
      const data = await api('/admin/innovations/ethical-dial');
      document.getElementById('dial-profit').value = data.profit_weight;
      document.getElementById('dial-fairness').value = data.fairness_weight;
      document.getElementById('dial-safety').value = data.safety_weight;
      document.getElementById('dial-box').textContent = JSON.stringify(data, null, 2);
    }

    async function updateDial() {
      const profit = Number(document.getElementById('dial-profit').value || 0.33);
      const fairness = Number(document.getElementById('dial-fairness').value || 0.34);
      const safety = Number(document.getElementById('dial-safety').value || 0.33);
      const data = await api('/admin/innovations/ethical-dial', {
        method: 'PATCH',
        body: JSON.stringify({ profit_weight: profit, fairness_weight: fairness, safety_weight: safety })
      });
      document.getElementById('dial-box').textContent = JSON.stringify(data, null, 2);
    }

    async function loadKpis() {
      const k = await api('/admin/innovations/kpis/summary');
      document.getElementById('kpi-mttr').textContent = String(k.mttr_minutes ?? '--');
      document.getElementById('kpi-crisis').textContent = String(k.crisis_prevention_rate ?? '--');
      document.getElementById('kpi-reopen').textContent = String(k.dispute_reopen_rate_proxy ?? '--');
      document.getElementById('kpi-accuracy').textContent = String(k.decision_accuracy_vs_actual ?? '--');
      document.getElementById('kpi-false').textContent = String(k.false_alert_rate ?? '--');
    }

    function renderFeatures() {
      const cards = [
        ['Policy Twin Simulator', runPolicyTwin],
        ['City Pulse Genome', runCityPulse],
        ['Trust-by-Route Index', runTrustRoute],
        ['Outcome Market', runOutcomeMarket],
        ['Silent Crisis Predictor', runSilentCrisis],
        ['Recovery Composer', runRecoveryComposer],
        ['Ethical Risk Dial', loadEthicalDial],
        ['Narrative Audit Lens', runNarrativeAudit],
        ['Admin Copilot Arena', runCopilotArena],
        ['Autonomous Hub Rebalancer', runHubRebalancer],
        ['Phase Roadmap', runRoadmap],
        ['Governance Compliance Report', runComplianceReport]
      ];

      const root = document.getElementById('features');
      root.innerHTML = cards.map(([title], i) => `
        <div class="p-4 rounded-xl border border-gray-100 bg-gray-50 flex items-center justify-between gap-2">
          <p class="font-extrabold text-gray-800">${i + 1}) ${title}</p>
          <button onclick="window.__runFeature(${i})" class="px-3 py-1.5 rounded-lg bg-indigo-600 text-white text-xs font-extrabold">تشغيل</button>
        </div>
      `).join('');

      window.__runFeature = async function(index) {
        try {
          await cards[index][1]();
        } catch (e) {
          alert(e.message || 'فشل التنفيذ');
        }
      };
    }

    async function refreshAll() {
      try {
        await Promise.all([loadKpis(), loadEthicalDial()]);
      } catch (e) {
        setOutput(e.message || 'فشل التحديث');
      }
    }

    (async function init() {
      try {
        const t = token();
        if (t) document.getElementById('token').value = t;
        renderFeatures();
        await refreshAll();
      } catch (e) {
        setOutput(e.message || 'تعذر التحميل');
      }
    })();
  </script>
</body>
</html>
