<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickup Hubs Control - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Cairo', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
      <div id="crisis-banner" class="hidden mb-6 rounded-2xl border border-amber-200 bg-amber-50 p-4">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <p class="font-extrabold text-amber-900"><i class="fas fa-triangle-exclamation ml-2"></i><span id="crisis-title">Crisis Mode</span></p>
            <p id="crisis-message" class="text-xs font-bold text-amber-800 mt-1"></p>
          </div>
          <button onclick="refreshCrisis()" class="bg-white text-amber-700 px-4 py-2 rounded-xl font-extrabold hover:bg-amber-100">تحديث</button>
        </div>
      </div>

      <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl shadow-lg p-6 mb-6 text-white">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <h1 class="text-2xl md:text-3xl font-extrabold"><i class="fas fa-location-dot ml-2"></i>Pickup Hubs Control</h1>
            <p class="text-indigo-100 text-sm mt-1">تفعيل/تعطيل hubs + خصائص الأمان/الإتاحة + قياس التبنّي</p>
          </div>
          <button onclick="refreshAll()" class="bg-white text-indigo-600 px-5 py-2.5 rounded-xl font-bold hover:bg-indigo-50 transition-all shadow">
            <i class="fas fa-sync-alt ml-2"></i>
            تحديث
          </button>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 space-y-4">
          <div class="bg-white rounded-2xl shadow p-5 border border-gray-100">
            <div class="space-y-3">
              <div>
                <label class="block text-xs font-extrabold text-gray-600 mb-1">Admin Token (Bearer)</label>
                <input id="token-input" type="password" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold" placeholder="الصق التوكن هنا" />
              </div>
              <div class="flex gap-2">
                <button onclick="saveToken()" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl font-extrabold hover:bg-indigo-700">حفظ</button>
                <button onclick="clearToken()" class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-xl font-extrabold hover:bg-gray-200">مسح</button>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-2xl shadow p-5 border border-gray-100">
            <h2 class="text-sm font-extrabold text-gray-800 mb-3">إضافة Hub</h2>
            <div class="space-y-2">
              <input id="new-title" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold" placeholder="Title" />
              <input id="new-category" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold" placeholder="Category (اختياري)" />
              <div class="grid grid-cols-2 gap-2">
                <input id="new-lat" type="number" step="0.000001" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold" placeholder="Lat" />
                <input id="new-lng" type="number" step="0.000001" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold" placeholder="Lng" />
              </div>
              <button onclick="createHub()" class="w-full bg-emerald-600 text-white py-2.5 rounded-xl font-extrabold hover:bg-emerald-700">إضافة</button>
            </div>
          </div>

          <div class="bg-white rounded-2xl shadow p-5 border border-gray-100">
            <h2 class="text-sm font-extrabold text-gray-800 mb-3">قياس التبنّي (آخر 30 يوم)</h2>
            <div id="metrics" class="space-y-2 text-sm"></div>
          </div>
        </div>

        <div class="lg:col-span-2 bg-white rounded-2xl shadow p-5 border border-gray-100">
          <div class="flex items-center justify-between gap-3 flex-wrap mb-3">
            <h2 class="text-sm font-extrabold text-gray-800">قائمة Hubs</h2>
            <label class="flex items-center gap-2 text-xs font-extrabold text-gray-600">
              <input id="include-inactive" type="checkbox" class="w-4 h-4" onchange="refreshAll()" />
              عرض غير المفعلة
            </label>
          </div>
          <div id="hubs" class="space-y-3"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="api-service.js"></script>
  <script>
    const TOKEN_KEY = 'akwadra_token';
    function getToken(){ try { return localStorage.getItem(TOKEN_KEY); } catch(e){ return null; } }
    function setToken(t){ try { localStorage.setItem(TOKEN_KEY, String(t||'').trim()); } catch(e){} }
    function saveToken(){ const v=document.getElementById('token-input').value; if(!v||!v.trim()) return alert('أدخل التوكن'); setToken(v); alert('تم حفظ التوكن'); }
    function clearToken(){ try{localStorage.removeItem(TOKEN_KEY);}catch(e){} document.getElementById('token-input').value=''; alert('تم مسح التوكن'); }

    function boolBadge(v){ return v ? '<span class="px-2 py-1 rounded-full bg-emerald-50 text-emerald-700 text-[11px] font-extrabold">Yes</span>' : '<span class="px-2 py-1 rounded-full bg-gray-100 text-gray-700 text-[11px] font-extrabold">No</span>'; }

    async function refreshAll(){
      await Promise.all([loadHubs(), loadMetrics()]);
    }

    async function loadHubs(){
      const el = document.getElementById('hubs');
      el.innerHTML = '<div class="text-center py-10 text-gray-500"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p class="font-bold">جاري التحميل...</p></div>';
      try{
        const includeInactive = document.getElementById('include-inactive').checked;
        const data = await ApiService.request(`/admin/pickup-hubs?include_inactive=${includeInactive ? '1' : '0'}`);
        const hubs = Array.isArray(data.data) ? data.data : [];
        if(!hubs.length){
          el.innerHTML = '<div class="text-center py-10 text-gray-500"><i class="fas fa-circle-check text-3xl mb-3"></i><p class="font-bold">لا يوجد hubs</p></div>';
          return;
        }
        el.innerHTML = hubs.map(h => {
          return `
            <div class="p-4 rounded-2xl border border-gray-200 bg-white">
              <div class="flex items-start justify-between gap-3 flex-wrap">
                <div class="min-w-0">
                  <p class="font-extrabold text-gray-800">#${h.id} • ${h.title}</p>
                  <p class="text-xs font-bold text-gray-500 truncate">${h.category || '--'} • ${h.lat}, ${h.lng}</p>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[11px] font-extrabold px-2 py-1 rounded-full ${h.is_active ? 'bg-blue-50 text-blue-700' : 'bg-gray-100 text-gray-700'}">${h.is_active ? 'active' : 'inactive'}</span>
                </div>
              </div>

              <div class="mt-3 grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                <div class="bg-gray-50 border border-gray-200 rounded-2xl p-2">Wheelchair: ${boolBadge(h.wheelchair_accessible)}</div>
                <div class="bg-gray-50 border border-gray-200 rounded-2xl p-2">Ramp: ${boolBadge(h.ramp_available)}</div>
                <div class="bg-gray-50 border border-gray-200 rounded-2xl p-2">Low traffic: ${boolBadge(h.low_traffic)}</div>
                <div class="bg-gray-50 border border-gray-200 rounded-2xl p-2">Lighting: ${boolBadge(h.good_lighting)}</div>
              </div>

              <div class="mt-3 grid grid-cols-2 md:grid-cols-5 gap-2 text-xs font-bold">
                <label class="flex items-center gap-2 p-2 rounded-2xl border border-gray-200 bg-gray-50"><input type="checkbox" ${h.is_active ? 'checked' : ''} onchange="updateHub(${h.id}, { is_active: this.checked })" /> active</label>
                <label class="flex items-center gap-2 p-2 rounded-2xl border border-gray-200 bg-gray-50"><input type="checkbox" ${h.wheelchair_accessible ? 'checked' : ''} onchange="updateHub(${h.id}, { wheelchair_accessible: this.checked })" /> wheelchair</label>
                <label class="flex items-center gap-2 p-2 rounded-2xl border border-gray-200 bg-gray-50"><input type="checkbox" ${h.ramp_available ? 'checked' : ''} onchange="updateHub(${h.id}, { ramp_available: this.checked })" /> ramp</label>
                <label class="flex items-center gap-2 p-2 rounded-2xl border border-gray-200 bg-gray-50"><input type="checkbox" ${h.low_traffic ? 'checked' : ''} onchange="updateHub(${h.id}, { low_traffic: this.checked })" /> low traffic</label>
                <label class="flex items-center gap-2 p-2 rounded-2xl border border-gray-200 bg-gray-50"><input type="checkbox" ${h.good_lighting ? 'checked' : ''} onchange="updateHub(${h.id}, { good_lighting: this.checked })" /> lighting</label>
              </div>
            </div>
          `;
        }).join('');
      }catch(e){
        console.error(e);
        el.innerHTML = `<div class="text-center py-10 text-red-600"><i class="fas fa-triangle-exclamation text-3xl mb-3"></i><p class="font-extrabold">تعذر تحميل hubs</p><p class="text-sm font-bold">${e.message}</p></div>`;
      }
    }

    async function updateHub(id, patch){
      try{
        await ApiService.request(`/admin/pickup-hubs/${encodeURIComponent(id)}`, { method:'PATCH', body: JSON.stringify(patch) });
      }catch(e){
        console.error(e);
        alert(`تعذر التحديث: ${e.message}`);
      }
    }

    async function createHub(){
      try{
        const title = document.getElementById('new-title').value.trim();
        const category = document.getElementById('new-category').value.trim();
        const lat = Number(document.getElementById('new-lat').value);
        const lng = Number(document.getElementById('new-lng').value);
        if(!title) return alert('أدخل Title');
        if(!Number.isFinite(lat) || !Number.isFinite(lng)) return alert('Lat/Lng غير صحيح');
        await ApiService.request('/admin/pickup-hubs', { method:'POST', body: JSON.stringify({ title, category: category || null, lat, lng, is_active: true }) });
        document.getElementById('new-title').value='';
        document.getElementById('new-category').value='';
        document.getElementById('new-lat').value='';
        document.getElementById('new-lng').value='';
        await refreshAll();
      }catch(e){
        console.error(e);
        alert(`تعذر الإضافة: ${e.message}`);
      }
    }

    async function loadMetrics(){
      const el = document.getElementById('metrics');
      el.innerHTML = '<div class="text-center py-6 text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><p class="font-bold">جاري التحميل...</p></div>';
      try{
        const data = await ApiService.request('/admin/pickup-hubs/metrics?days=30');
        const rows = Array.isArray(data.data) ? data.data : [];
        if(!rows.length){
          el.innerHTML = '<p class="text-xs font-bold text-gray-500">لا توجد بيانات</p>';
          return;
        }
        el.innerHTML = rows.slice(0, 10).map(r => {
          const rate = (r.accept_rate_percent === null || r.accept_rate_percent === undefined) ? '--' : (r.accept_rate_percent + '%');
          return `
            <div class="p-3 rounded-2xl border border-gray-200 bg-gray-50">
              <p class="font-extrabold text-gray-800 truncate">${r.title || ('Hub #' + r.hub_id)}</p>
              <p class="text-xs font-bold text-gray-500">Suggestions: ${r.suggestions_total} • Accepted: ${r.accepted_count} • Rejected: ${r.rejected_count} • Rate: ${rate}</p>
            </div>
          `;
        }).join('');
      }catch(e){
        console.error(e);
        el.innerHTML = `<div class="text-center py-6 text-red-600"><i class="fas fa-triangle-exclamation text-2xl mb-2"></i><p class="font-extrabold">تعذر تحميل القياس</p><p class="text-sm font-bold">${e.message}</p></div>`;
      }
    }

    (function init(){
      const t = getToken();
      if(t) document.getElementById('token-input').value = t;
      refreshCrisis();
      refreshAll();
    })();

    async function refreshCrisis(){
      try{
        const data = await ApiService.request('/admin/crisis-mode');
        const c = data.data || {};
        const enabled = !!c.enabled;
        const banner = document.getElementById('crisis-banner');
        banner.classList.toggle('hidden', !enabled);
        if(enabled){
          document.getElementById('crisis-title').textContent = c.title || 'Crisis Mode';
          document.getElementById('crisis-message').textContent = c.message || 'تم تفعيل وضع الطوارئ';
        }
      }catch(e){}
    }
  </script>
</body>
</html>
