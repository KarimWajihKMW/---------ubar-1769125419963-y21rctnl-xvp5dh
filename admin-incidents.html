<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مراجعة النزاعات/الحوادث - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Cairo', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <div class="min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
      <div id="crisis-banner" class="hidden mb-6 rounded-2xl border border-amber-200 bg-amber-50 p-4">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <p class="font-extrabold text-amber-900"><i class="fas fa-triangle-exclamation ml-2"></i><span id="crisis-title">Crisis Mode</span></p>
            <p id="crisis-message" class="text-xs font-bold text-amber-800 mt-1"></p>
          </div>
          <button onclick="refreshCrisis()" class="bg-white text-amber-700 px-4 py-2 rounded-xl font-extrabold hover:bg-amber-100">تحديث</button>
        </div>
      </div>

      <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl shadow-lg p-6 mb-6 text-white">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <h1 class="text-2xl md:text-3xl font-extrabold">
              <i class="fas fa-shield-halved ml-2"></i>
              مراجعة النزاعات/الحوادث
            </h1>
            <p class="text-indigo-100 text-sm mt-1">عرض ومراجعة باكدجات الأدلة المرتبطة بالرحلات</p>
          </div>
          <button onclick="refreshList()" class="bg-white text-indigo-600 px-5 py-2.5 rounded-xl font-bold hover:bg-indigo-50 transition-all shadow">
            <i class="fas fa-sync-alt ml-2"></i>
            تحديث
          </button>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Left: List -->
        <div class="lg:col-span-1 bg-white rounded-2xl shadow p-5 border border-gray-100">
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-extrabold text-gray-600 mb-1">Admin Token (Bearer)</label>
              <input id="token-input" type="password" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold" placeholder="الصق التوكن هنا" />
              <p class="text-[11px] text-gray-500 mt-1">يتم حفظه في localStorage تحت akwadra_token</p>
            </div>
            <div class="flex gap-2">
              <button onclick="saveToken()" class="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl font-extrabold hover:bg-indigo-700">حفظ</button>
              <button onclick="clearToken()" class="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-xl font-extrabold hover:bg-gray-200">مسح</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-xs font-extrabold text-gray-600 mb-1">الحالة</label>
                <select id="status-select" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold">
                  <option value="open" selected>open</option>
                  <option value="resolved">resolved</option>
                  <option value="rejected">rejected</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-extrabold text-gray-600 mb-1">الحد</label>
                <input id="limit-input" type="number" min="1" max="200" value="50" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold" />
              </div>
            </div>
          </div>

          <div class="mt-5">
            <h2 class="text-sm font-extrabold text-gray-800 mb-3">القائمة</h2>
            <div id="list" class="space-y-2">
              <div class="text-center py-10 text-gray-500">
                <i class="fas fa-inbox text-3xl mb-3"></i>
                <p class="font-bold">اضغط تحديث لعرض البيانات</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Details -->
        <div class="lg:col-span-2 bg-white rounded-2xl shadow p-5 border border-gray-100">
          <div class="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h2 class="text-lg font-extrabold text-gray-800">التفاصيل</h2>
              <p id="details-sub" class="text-xs text-gray-500 font-bold">اختر عنصر من القائمة</p>
            </div>
            <div class="flex gap-2">
              <button id="resolve-btn" onclick="resolveSelected('resolved')" class="hidden bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-extrabold hover:bg-emerald-700">Resolve</button>
              <button id="reject-btn" onclick="resolveSelected('rejected')" class="hidden bg-red-600 text-white px-4 py-2.5 rounded-xl font-extrabold hover:bg-red-700">Reject</button>
            </div>
          </div>

          <div id="details" class="mt-4">
            <div class="text-center py-16 text-gray-500">
              <i class="fas fa-file-lines text-3xl mb-3"></i>
              <p class="font-bold">لا توجد تفاصيل</p>
            </div>
          </div>

          <div id="resolution" class="hidden mt-4">
            <label class="block text-xs font-extrabold text-gray-600 mb-1">Resolution note (اختياري)</label>
            <textarea id="resolution-note" rows="3" class="w-full px-3 py-2.5 rounded-xl border border-gray-200 font-bold" placeholder="اكتب سبب/قرار الإدارة"></textarea>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="api-service.js"></script>
  <script>
        async function refreshCrisis(){
          try{
            const data = await ApiService.admin.getCrisisMode();
            const c = data.data || {};
            const enabled = !!c.enabled;
            const banner = document.getElementById('crisis-banner');
            banner.classList.toggle('hidden', !enabled);
            if(enabled){
              document.getElementById('crisis-title').textContent = c.title || 'Crisis Mode';
              document.getElementById('crisis-message').textContent = c.message || 'تم تفعيل وضع الطوارئ';
            }
          }catch(e){}
        }
    const TOKEN_KEY = 'akwadra_token';
    let selectedIncidentId = null;

    function getToken() {
      const t = localStorage.getItem(TOKEN_KEY);
      return t && String(t).trim() ? String(t).trim() : null;
    }

    function setToken(t) {
      if (!t) return;
      localStorage.setItem(TOKEN_KEY, String(t).trim());
    }

    function saveToken() {
      const v = document.getElementById('token-input').value;
      if (!v || !v.trim()) return alert('أدخل التوكن');
      setToken(v);
      alert('تم حفظ التوكن');
    }

    function clearToken() {
      localStorage.removeItem(TOKEN_KEY);
      document.getElementById('token-input').value = '';
      alert('تم مسح التوكن');
    }

    function fmtDate(v) {
      if (!v) return '--';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return '--';
      return d.toLocaleString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function renderList(items) {
      const el = document.getElementById('list');
      if (!items.length) {
        el.innerHTML = `<div class="text-center py-10 text-gray-500"><i class="fas fa-circle-check text-3xl mb-3"></i><p class="font-bold">لا توجد عناصر</p></div>`;
        return;
      }

      el.innerHTML = items.map((x) => {
        const title = x.title ? String(x.title) : (x.kind === 'dispute' ? 'نزاع' : 'حادث');
        return `
          <button onclick="selectIncident(${x.id})" class="w-full text-right p-3 rounded-2xl border border-gray-200 hover:bg-gray-50 transition">
            <div class="flex items-center justify-between gap-2">
              <div class="min-w-0">
                <p class="font-extrabold text-gray-800 truncate">#${x.id} • ${title}</p>
                <p class="text-[11px] text-gray-500 font-bold truncate">Trip: ${x.trip_id} • ${x.kind} • ${fmtDate(x.created_at)}</p>
              </div>
              <span class="text-[11px] font-extrabold px-2 py-1 rounded-full bg-indigo-50 text-indigo-700">${x.status}</span>
            </div>
          </button>
        `;
      }).join('');
    }

    async function refreshList() {
      try {
        const status = document.getElementById('status-select').value;
        const limit = Number(document.getElementById('limit-input').value || 50);
        const data = await ApiService.admin.listIncidents({ status, limit });
        renderList(Array.isArray(data.data) ? data.data : []);
      } catch (e) {
        console.error(e);
        alert(`تعذر تحميل القائمة: ${e.message}`);
      }
    }

    async function selectIncident(id) {
      selectedIncidentId = id;
      const details = document.getElementById('details');
      const sub = document.getElementById('details-sub');
      details.innerHTML = `<div class="text-center py-10 text-gray-500"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p class="font-bold">جاري التحميل...</p></div>`;
      sub.textContent = `Incident #${id}`;

      try {
        const data = await ApiService.admin.getIncident(id);
        const row = data.data;

        const pkg = row.package_json ? JSON.stringify(row.package_json, null, 2) : '';

        details.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-3">
              <p class="text-xs text-gray-500 font-bold">Trip</p>
              <p class="font-extrabold text-gray-800 break-all">${row.trip_id || '--'}</p>
            </div>
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-3">
              <p class="text-xs text-gray-500 font-bold">Kind</p>
              <p class="font-extrabold text-gray-800">${row.kind}</p>
            </div>
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-3">
              <p class="text-xs text-gray-500 font-bold">Status</p>
              <p class="font-extrabold text-gray-800">${row.status}</p>
            </div>
          </div>

          <div class="mt-3 bg-gray-50 border border-gray-200 rounded-2xl p-3">
            <p class="text-xs text-gray-500 font-bold">Title</p>
            <p class="font-extrabold text-gray-800">${row.title || '--'}</p>
          </div>

          <div class="mt-3 bg-gray-50 border border-gray-200 rounded-2xl p-3">
            <p class="text-xs text-gray-500 font-bold">Description</p>
            <p class="text-sm font-bold text-gray-700 whitespace-pre-wrap">${row.description || '--'}</p>
          </div>

          <div class="mt-3">
            <p class="text-xs text-gray-500 font-extrabold mb-2">Package JSON</p>
            <textarea class="w-full h-80 px-3 py-2.5 rounded-2xl border border-gray-200 font-mono text-xs" readonly>${pkg}</textarea>
          </div>
        `;

        const showActions = row.status === 'open';
        document.getElementById('resolve-btn').classList.toggle('hidden', !showActions);
        document.getElementById('reject-btn').classList.toggle('hidden', !showActions);
        document.getElementById('resolution').classList.toggle('hidden', !showActions);
      } catch (e) {
        console.error(e);
        details.innerHTML = `<div class="text-center py-10 text-red-600"><i class="fas fa-triangle-exclamation text-3xl mb-3"></i><p class="font-extrabold">تعذر تحميل التفاصيل</p><p class="text-sm font-bold">${e.message}</p></div>`;
        document.getElementById('resolve-btn').classList.add('hidden');
        document.getElementById('reject-btn').classList.add('hidden');
        document.getElementById('resolution').classList.add('hidden');
      }
    }

    async function resolveSelected(status) {
      if (!selectedIncidentId) return;
      try {
        const note = document.getElementById('resolution-note').value || '';

        // U10: Root‑Cause Closure required on final decision
        const root_cause_key = prompt('Root‑Cause Key (مثال: driver_behavior / ops_delay / other):') || '';
        const prevention_key = prompt('Prevention Key (مثال: agent_training / policy_update / other):') || '';
        if (!String(root_cause_key).trim() || !String(prevention_key).trim()) {
          return alert('لا يمكن إغلاق/حسم Incident بدون Root‑Cause + Prevention (U10)');
        }

        await ApiService.admin.resolveIncident(selectedIncidentId, {
            status,
            resolution_note: note.trim() ? note.trim() : null,
            root_cause_key: String(root_cause_key).trim(),
            prevention_key: String(prevention_key).trim()
        });
        alert('تم تحديث الحالة');
        await refreshList();
        await selectIncident(selectedIncidentId);
      } catch (e) {
        console.error(e);
        alert(`تعذر التحديث: ${e.message}`);
      }
    }

    // Init
    (function init() {
      const t = getToken();
      if (t) document.getElementById('token-input').value = t;
      refreshCrisis();
    })();
  </script>

</body>
</html>
